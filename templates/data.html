<!DOCTYPE html>
<html lang="en">
<head>
    <title>Stored Data</title>

    <style>
        body {
            background: linear-gradient(to right, #1f0404, #210505);
            color: rgb(255, 126, 126);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            background: linear-gradient(to right, #ff0000, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 600px;
            margin: auto;
        }

        .card {
            background: #240000;
            border: 1px solid #ff0000;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .id {
            font-size: 12px;
            color: rgb(143, 102, 102);
        }

        .text {
            font-size: 18px;
            margin-top: 5px;
        }

        .back {
            display: block;
            width: 120px;
            margin: 20px auto;
            text-align: center;
            padding: 10px;
            background: linear-gradient(to right, #ff4d00, #ff0000);
            color: rgb(71, 0, 0);
            text-decoration: none;
            border-radius: 5px;
        }

        .back:hover {
            filter: brightness(1.2);
        }
    </style>
</head>

<body>
    <h1>Stored Inputs</h1>

    <div class="container">
        {% for item in data %}
            <div class="card">
                <div class="id">#{{ loop.index }}</div>
                <div class="text">{{ item.input }}</div>
                <div class="time">{{ item.time }}</div>
            </div>
        {% else %}
            <p>No data yet.</p>
        {% endfor %}
    </div>

    <a class="back" href="/">Go Back</a>

</body>
</html>
